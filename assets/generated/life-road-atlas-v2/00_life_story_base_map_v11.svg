<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 982 966" width="982" height="966" role="img" aria-label="Project Mystery clean life road base map">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66c8f2"/>
      <stop offset="1" stop-color="#1688c3"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8cf48"/>
      <stop offset="1" stop-color="#78ad35"/>
    </linearGradient>
    <linearGradient id="cliff" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c48b4b"/>
      <stop offset="1" stop-color="#8c5b2d"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe3ae"/>
      <stop offset="1" stop-color="#e2b975"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#6d4b26" flood-opacity="0.28"/>
    </filter>
    <style>
      .bg { fill: #f7edcf; }
      .water { fill: url(#water); }
      .water-line { fill: none; stroke: rgba(255,255,255,0.38); stroke-width: 2; stroke-linecap: round; }
      .cliff { fill: url(#cliff); stroke: #73461f; stroke-width: 3; }
      .land { fill: url(#grass); stroke: #5b7f25; stroke-width: 3; filter: url(#softShadow); }
      .road-shadow { fill: none; stroke: #9d6b35; stroke-width: 34; stroke-linecap: round; stroke-linejoin: round; opacity: 0.7; }
      .road { fill: none; stroke: url(#stone); stroke-width: 24; stroke-linecap: round; stroke-linejoin: round; }
      .road-inner { fill: none; stroke: rgba(255,255,255,0.34); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 7 18; }
      .bridge-shadow { fill: none; stroke: #6c431f; stroke-width: 38; stroke-linecap: round; stroke-linejoin: round; }
      .bridge { fill: none; stroke: #b77936; stroke-width: 28; stroke-linecap: round; stroke-linejoin: round; }
      .bridge-rail { fill: none; stroke: #5b3518; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 9 14; opacity: 0.9; }
      .stairs-shadow { fill: none; stroke: #8a5a2b; stroke-width: 30; stroke-linecap: round; stroke-linejoin: round; opacity: 0.65; }
      .stairs { fill: none; stroke: #e8bf79; stroke-width: 22; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 12 9; }
      .pad-shadow { fill: #a87435; opacity: 0.55; }
      .pad { fill: url(#stone); stroke: #9b6a32; stroke-width: 3; }
      .pad-ring { fill: none; stroke: rgba(142,92,39,0.38); stroke-width: 3; }
      .tree-trunk { fill: #8b5a2b; }
      .tree { fill: #27865a; stroke: #1f6647; stroke-width: 2; }
      .tree2 { fill: #78a928; stroke: #577c1d; stroke-width: 2; }
      .rock { fill: #b8b09a; stroke: #827a68; stroke-width: 2; }
      .flower-p { fill: #ed7e9a; }
      .flower-y { fill: #f2c94c; }
      .flower-w { fill: #f8f1d8; }
      .terminal-lighthouse { fill: #f6e5c4; stroke: #9b6a32; stroke-width: 3; }
      .lighthouse-red { fill: #d85635; }
      .star { fill: #ffd54d; stroke: #a77420; stroke-width: 3; }
      .mountain { fill: #6c8790; stroke: #3f5962; stroke-width: 3; }
      .snow { fill: #f4f2e8; }
    </style>
  </defs>

