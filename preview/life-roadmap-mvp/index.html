<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>人生路况</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-shell" aria-label="人生路况">
      <section id="inputScreen" class="app-screen input-screen">
        <header class="hero">
          <p>先填基本信息</p>
          <h1>人生路况</h1>
          <span>填入出生信息，为你解读人生未来的路况</span>
        </header>

        <form id="lifeForm" class="form-panel">
          <section class="avatar-picker auto-avatar" aria-label="系统匹配棋子形象">
            <img id="avatarPreview" class="avatar-sample" src="../../assets/generated/life-road-atlas-v2/avatars/female_young.png" alt="" />
            <div class="avatar-picker-header">
              <strong id="avatarLabel">你在地图中的形象</strong>
            </div>
          </section>

          <label>
            <span>性别</span>
            <select id="gender" required>
              <option value="female" selected>女</option>
              <option value="male">男</option>
            </select>
          </label>

          <label>
            <span>出生日期</span>
            <input id="birthDate" type="date" required value="1996-04-18" />
          </label>

          <label>
            <span>出生时间</span>
            <input id="birthTime" type="time" value="08:30" />
          </label>

          <label>
            <span>出生地</span>
            <input id="birthplace" type="text" value="杭州" placeholder="例如：杭州" />
          </label>

          <button class="primary-button" type="submit">分析我未来的路</button>
        </form>
      </section>

      <section id="resultScreen" class="app-screen result-screen hidden">
        <header class="topbar">
          <div class="title-stack">
            <p class="overline" id="resultOverline">当下路况</p>
            <h1 id="resultHeadline">人生路况</h1>
            <span id="resultSubline">看你现在落在哪段地势。</span>
          </div>
          <div class="top-actions">
            <button id="backButton" class="icon-button" type="button" aria-label="返回输入">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m15 18-6-6 6-6" />
              </svg>
            </button>
            <button id="traceButton" class="icon-button" type="button" aria-label="查看分析依据">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 20h9" />
                <path d="M12 4h9" />
                <path d="M4 9h16" />
                <path d="M4 15h16" />
                <path d="M4 4h.01" />
                <path d="M4 20h.01" />
              </svg>
            </button>
          </div>
        </header>

        <section class="map-region">
          <div class="map-verdict" aria-live="polite">
            <strong id="verdictPill">前路建议</strong>
            <span id="verdictAction">保持车道</span>
            <span id="verdictRisk">风险可控</span>
          </div>
          <div id="lifeMap" class="life-map" role="img" aria-label="人生路况导航图"></div>
          <div id="mapLoading" class="map-loading">地图加载中</div>
        </section>

        <section class="route-sheet">
          <div class="sheet-handle" aria-hidden="true"></div>
          <div class="sheet-header">
            <div>
              <p id="sheetLabel" class="sheet-label">前路判断</p>
              <strong id="selectedSummary">前路待分析</strong>
              <span id="choiceLockHint" class="choice-lock-hint">选择不可回退，请按当下判断继续走。</span>
            </div>
          </div>

          <div id="decisionBoard" class="decision-board" aria-label="今日行动建议"></div>
          <div id="routeCards" class="route-cards" aria-label="路线选择"></div>
          <button id="detailPeekButton" class="detail-peek-button" type="button" aria-expanded="false">详细解读</button>
          <div id="scoreStrip" class="score-strip"></div>
          <div id="mapDetail" class="map-detail" aria-live="polite"></div>
          <div id="terminalReportCta" class="terminal-report-cta">
            <button id="openReportButton" type="button">预览未来报告</button>
            <button id="downloadReportButton" type="button">下载报告</button>
          </div>

          <div class="instruction-bar">
            <div>
              <p id="instructionTitle">下一步建议</p>
              <span id="instructionBody">保持车道。</span>
            </div>
          </div>
        </section>
        <div id="shareToast" class="share-toast hidden">签文已备好</div>
      </section>

      <section id="tracePanel" class="trace-panel hidden" aria-label="分析依据">
        <div class="trace-card">
          <header>
            <strong>为什么是这个结果</strong>
            <button id="closeTrace" type="button">关闭</button>
          </header>
          <div id="traceOutput" class="evidence-list"></div>
        </div>
      </section>

      <section id="futureReportPanel" class="future-report-panel hidden" aria-label="未来报告" role="dialog" aria-modal="true">
        <div class="future-report-card">
          <header>
            <div>
              <span id="futureReportStatus">生成中</span>
              <strong id="futureReportTitle">你的未来报告</strong>
            </div>
            <button id="closeReportButton" type="button">关闭</button>
          </header>
          <div id="futureReportBody" class="future-report-body">正在生成未来 20 年报告。</div>
          <footer>
            <button id="copyReportButton" type="button">复制</button>
            <button id="previewReportButton" type="button">预览</button>
            <button id="downloadReportModalButton" type="button">下载</button>
          </footer>
        </div>
      </section>
    </main>

    <script src="./vendor/lunar.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
