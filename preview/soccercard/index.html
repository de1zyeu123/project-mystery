<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>测测你的命中球缘</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23087934'/%3E%3Ccircle cx='32' cy='32' r='13' fill='%23fffdf4'/%3E%3Cpath d='M32 6v52M6 32h52' stroke='%23f4c431' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css?v=20260606-mobile-fix-v1" />
  </head>
  <body>
    <main class="shell">
      <section class="phone" aria-label="测测你的命中球缘">
        <section class="screen screen-form active" data-screen="form">
          <div class="field-top">
            <p class="eyebrow">开球测试</p>
            <h1>测测你的<br />命中球缘</h1>
          </div>

          <form id="birth-form" class="form-card">
            <label>
              <span>你的球场名</span>
              <input id="nickname" name="nickname" maxlength="12" placeholder="输入你的昵称" />
            </label>

            <div class="grid-2">
              <label>
                <span>性别</span>
                <select id="gender" name="gender">
                  <option>男</option>
                  <option>女</option>
                  <option>不展示</option>
                </select>
              </label>
              <label>
                <span>出生地</span>
                <input id="birthplace" name="birthplace" maxlength="12" value="上海" />
              </label>
            </div>

            <div class="grid-2">
              <label>
                <span>出生日期</span>
                <input id="birthdate" name="birthdate" type="text" value="1998-07-10" inputmode="numeric" autocomplete="bday" />
              </label>
              <label>
                <span>出生时间</span>
                <select id="birthtime" name="birthtime">
                  <option value="unknown">不知道</option>
                  <option value="0">00:00-01:59</option>
                  <option value="2">02:00-03:59</option>
                  <option value="4">04:00-05:59</option>
                  <option value="6">06:00-07:59</option>
                  <option value="8" selected>08:00-09:59</option>
                  <option value="10">10:00-11:59</option>
                  <option value="12">12:00-13:59</option>
                  <option value="14">14:00-15:59</option>
                  <option value="16">16:00-17:59</option>
                  <option value="18">18:00-19:59</option>
                  <option value="20">20:00-21:59</option>
                  <option value="22">22:00-23:59</option>
                </select>
              </label>
            </div>

            <fieldset>
              <legend>你是哪种球风？</legend>
              <div class="style-grid" id="style-grid">
                <button type="button" data-style="后防中坚">后防中坚</button>
                <button type="button" data-style="中场指挥官">中场指挥官</button>
                <button type="button" data-style="跑不死后腰">跑不死后腰</button>
                <button type="button" data-style="边路快马">边路快马</button>
                <button type="button" data-style="禁区杀手">禁区杀手</button>
                <button type="button" data-style="门线英雄">门线英雄</button>
                <button type="button" data-style="快乐抽象派">快乐抽象派</button>
                <button type="button" data-style="球王">球王</button>
                <button type="button" data-style="假摔一哥">假摔一哥</button>
                <button type="button" data-style="暴力野兽">暴力野兽</button>
              </div>
            </fieldset>

            <button class="primary" type="submit">一键生成你的命中球缘</button>
          </form>
        </section>

        <section class="screen screen-loading" data-screen="loading">
          <div class="loading-ball"></div>
          <div>
            <p class="eyebrow">生成中</p>
            <h2 id="loading-title">正在生成你的命中球缘</h2>
            <p id="loading-line">出生节奏、球风偏好、球员画像同步计算中。</p>
          </div>
          <div class="loading-steps">
            <span>出生信息</span>
            <span>行为分</span>
            <span>球员人设</span>
          </div>
        </section>

        <section class="screen screen-result" data-screen="result">
          <article class="result-card" id="result-card">
            <div class="result-media">
              <img id="result-image" alt="" />
              <div class="media-shade"></div>
              <div class="result-overlay">
                <p class="eyebrow" id="result-id">命中球缘</p>
                <p class="result-contrast" id="result-contrast" hidden></p>
                <h2 id="result-role">球场武僧</h2>
                <p class="result-line" id="result-summary">少林足球第一人</p>
              </div>
              <div class="overall-pill" id="top-score">综合能力值 88</div>
              <div class="radar-card" aria-label="六维能力图">
                <svg id="radar-chart" viewBox="0 0 164 164" role="img"></svg>
              </div>
            </div>

            <div class="result-copy">
              <section class="reading-panel" id="reading-panel">
                <div class="reading-head">
                  <div>
                    <strong>你的球缘分析</strong>
                    <p id="reading-summary">你的球缘更偏硬仗型，越到五五开越想上强度。</p>
                  </div>
                  <button type="button" id="reading-toggle" aria-expanded="false" aria-controls="reading-drawer">展开</button>
                </div>
                <div class="reading-drawer" id="reading-drawer" aria-hidden="true">
                <p class="reading" id="result-reading">你的球缘更偏硬仗型，越到五五开越想上强度，所以系统给你配了这个球员。</p>
                </div>
              </section>
              <div class="meta-row">
                <span id="result-position">中后卫</span>
                <span id="result-persona">球场恶汉</span>
                <span id="result-extra-tag">总裁保镖</span>
              </div>
            </div>
          </article>

          <div class="action-row">
            <button class="secondary" id="regen">再测一次</button>
            <button class="primary" id="save-result">分享给你的朋友</button>
          </div>
        </section>

        <section class="share-sheet" id="share-sheet" aria-hidden="true" aria-label="分享海报预览">
          <div class="share-copy">
            <strong>分享给你的朋友</strong>
            <span>截图模式会隐藏按钮，海报内含产品入口二维码。</span>
          </div>
          <button class="share-close" id="share-close" type="button" aria-label="返回结果">返回</button>
          <div class="share-poster-wrap" id="share-poster-wrap">
            <img id="share-poster" alt="命中球缘分享海报" />
          </div>
          <div class="share-actions">
            <button class="secondary" id="share-clean-mode" type="button">截图模式</button>
            <button class="secondary" id="download-poster" type="button">下载图片</button>
          </div>
        </section>

        <section class="screen screen-gallery" data-screen="gallery">
          <div class="gallery-head">
            <div>
              <p class="eyebrow">球员画像库</p>
              <h2>96 种命中球缘</h2>
            </div>
            <button id="close-gallery" aria-label="返回结果">返回</button>
          </div>
          <div class="gallery-toolbar">
            <span>每页 16 张</span>
            <strong id="gallery-page-label">1 / 6</strong>
          </div>
          <div class="gallery-grid" id="gallery-grid"></div>
          <div class="gallery-pager">
            <button id="gallery-prev">上一页</button>
            <button id="gallery-next">下一页</button>
          </div>
        </section>
      </section>

    </main>

    <script src="./players-data.js?v=20260605-release1"></script>
    <script src="./app.js?v=20260606-mobile-fix-v1"></script>
  </body>
</html>
